<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>品評表單系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF8;--surface:#fff;--border:#E8E5DF;--border-s:#C8C5BE;--text:#1A1A18;--muted:#6B6B68;--hint:#A8A8A5;--accent:#2D5A3D;--accent-l:#EAF2EC;--accent-t:#1A3D27;--star:#D4920A;--danger:#C0392B;--danger-l:#FBEAE8;--warn:#B8690A;--warn-l:#FEF3E2;--radius:10px;--radius-s:6px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
.app{max-width:540px;margin:0 auto;padding-bottom:80px}
.header{background:var(--accent);color:#fff;padding:16px 20px 12px;cursor:default;user-select:none}
.h-title{font-size:16px;font-weight:700}
.h-sub{font-size:12px;opacity:.75;margin-top:2px}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:60px;padding:10px 4px 8px;border:none;background:none;font-family:inherit;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.nav-btn.red{color:var(--danger)}
.content{padding:16px}
.slabel{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;font-size:14px;background:var(--bg);color:var(--text)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:64px}
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.chip{padding:7px 4px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:12px;font-family:inherit;text-align:center;cursor:pointer;color:var(--muted);background:var(--bg);user-select:none}
.chip.on{background:var(--accent-l);color:var(--accent-t);border-color:var(--accent);font-weight:700}
.chip.red.on{background:var(--danger-l);color:var(--danger);border-color:var(--danger)}
.star-block{margin-bottom:10px}.star-block:last-child{margin-bottom:0}
.star-q{font-size:14px;font-weight:500;margin-bottom:6px}
.star-row{display:flex;align-items:center;gap:6px}
.stars{display:flex;gap:3px}
.star{font-size:26px;cursor:pointer;color:#DDD;user-select:none;line-height:1}
.star.lit{color:var(--star)}
.na-btn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--muted);background:none;font-family:inherit}
.na-btn.on{background:var(--border)}
.note-hint{font-size:12px;color:var(--hint);margin:5px 0 3px}
.note-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);resize:none}
.note-input:focus{outline:none;border-color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.choice-group{display:flex;flex-wrap:wrap;gap:5px}
.choice-btn{padding:7px 12px;border:1px solid var(--border);border-radius:20px;font-family:inherit;font-size:13px;cursor:pointer;background:var(--bg);color:var(--muted)}
.choice-btn.sel{background:var(--accent-l);border-color:var(--accent);color:var(--accent-t);font-weight:700}
.choice-btn.red.sel{background:var(--danger-l);border-color:var(--danger);color:var(--danger)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:11px 18px;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none}
.btn-p{background:var(--accent);color:#fff;width:100%}.btn-p:active{opacity:.85}
.btn-s{background:none;border:1px solid var(--border-s);color:var(--text);font-weight:500}
.btn-d{background:var(--danger-l);color:var(--danger);border:1px solid #E8A09A;font-weight:500}
.btn-sm{padding:6px 12px;font-size:12px;font-weight:500}
.btn-xs{padding:4px 9px;font-size:11px;font-weight:500}
.page-nav{display:flex;align-items:center;justify-content:space-between;margin-top:18px;gap:10px}
.page-info{font-size:12px;color:var(--hint);text-align:center}
.dots{display:flex;gap:4px;justify-content:center;margin-top:5px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border-s)}
.dot.active{background:var(--accent)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center}
.metric-val{font-size:20px;font-weight:700;color:var(--accent)}
.metric-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.bar-item{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.bar-lbl{font-size:12px;width:68px;flex-shrink:0;color:var(--muted)}
.bar-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-score{font-size:11px;width:24px;text-align:right;color:var(--muted)}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px}
.tag-ok{background:var(--accent-l);color:var(--accent-t)}
.tag-bad{background:var(--danger-l);color:var(--danger)}
.tag-cat{background:#EEF2FF;color:#3730A3;font-size:10px;padding:2px 7px;border-radius:20px}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:7px}
.r-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.r-name{font-weight:700;font-size:13px}
.r-time{font-size:10px;color:var(--hint)}
.r-notes{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.notice{background:var(--accent-l);border:1px solid #B8D4BE;border-radius:var(--radius-s);padding:10px 12px;font-size:13px;color:var(--accent-t);margin-bottom:10px}
.saved-pill{display:inline-block;background:var(--accent-l);color:var(--accent-t);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px}
.empty{text-align:center;padding:32px 16px;color:var(--hint);font-size:14px}

/* 分類相關 */
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cat-badge{display:inline-flex;align-items:center;gap:5px;background:#EEF2FF;color:#3730A3;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.cat-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.cat-title-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.cat-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.cat-count{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.cat-arrow{color:var(--hint);font-size:14px;transition:transform .2s}
.cat-arrow.open{transform:rotate(90deg)}
.cat-body{padding:10px}
.sess-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-s);margin-bottom:6px;background:var(--bg)}
.sess-info{flex:1;cursor:pointer}
.sess-name{font-size:13px;font-weight:500}
.sess-meta{font-size:11px;color:var(--muted);margin-top:1px}
.sess-count{background:var(--accent-l);color:var(--accent-t);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;cursor:pointer}
.sess-btns{display:flex;gap:4px;flex-shrink:0}

/* 趨勢圖 */
.trend-wrap{overflow-x:auto;margin-top:6px}
.trend-svg{display:block}
.trend-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.trend-tab{padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:none;font-family:inherit;color:var(--muted)}
.trend-tab.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent-t);font-weight:700}

/* 分次列表 */
.round-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-s);margin-bottom:5px;cursor:pointer;background:var(--bg)}
.round-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.round-info{flex:1}
.round-name{font-size:13px;font-weight:500}
.round-meta{font-size:11px;color:var(--muted)}
.round-count{font-size:11px;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:20px}

.qr-wrap{text-align:center;padding:6px 0}
.qr-img{width:200px;height:200px;border-radius:var(--radius);border:1px solid var(--border)}
.pin-page{text-align:center;padding:24px 16px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.pin-box{background:var(--surface);border-radius:var(--radius);padding:24px 20px;width:100%;max-width:290px;text-align:center}
.pin-input{width:100%;padding:12px;text-align:center;font-size:22px;letter-spacing:.3em;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;margin-bottom:10px;background:var(--bg)}
.pin-error{font-size:12px;color:var(--danger);margin-bottom:7px}
</style>
</head>
<body>
<div class="app">
  <div class="header" onclick="headerTap()">
    <div class="h-title" id="h-title">品評表單系統</div>
    <div class="h-sub" id="h-sub">載入中...</div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="content" id="content"><div class="empty">載入中...</div></div>
</div>
<script>
// ── Firebase REST ──
const FB = 'https://evaluation-survey-form-default-rtdb.firebaseio.com';
async function fbGet(p){const r=await fetch(`${FB}/${p}.json`);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function fbSet(p,v){const r=await fetch(`${FB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});if(!r.ok)throw new Error('HTTP '+r.status);}
async function fbPush(p,v){const r=await fetch(`${FB}/${p}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function fbDel(p){await fetch(`${FB}/${p}.json`,{method:'DELETE'});}

const TASTES=['鹹','甜','辣','辛/嗆','油','苦','茶','奶','焦','澀','酸','果香','咖啡','香料'];
const FIXED=['氣味/香氣','口感/酥脆','口感/黏牙'];
const DEFAULT_CATS=['原料','專案','試車','首批大貨','保存測試'];
const BASE_URL=location.href.split('?')[0].split('#')[0];
const CAT_COLORS={'原料':'#7C3AED','專案':'#0369A1','試車':'#B45309','首批大貨':'#065F46','保存測試':'#9D174D'};
function safeKey(k){return k.replace(/[\/\.\[\]#\$]/g,'_');}
function getSid(){return new URLSearchParams(location.search).get('s');}

let S={
  tab:'form', adminOK:false, adminPrompt:false, adminErr:false,
  pinOK:false, pinErr:false, savedBadge:false, adminPin:'1234',
  // data
  categories:{},   // {catId:{name,color,order}}
  sessions:{},     // {sessId:{name,catId,catName,testDate,evalDate,enabledTastes,showAnomaly,roundNum,parentId,createdAt}}
  responses:{},    // {sessId:[...]}
  // nav state
  expandedCats:{},
  currentSessId:null,
  currentCatId:null,
  editSess:null, editIsNew:false,
  editCat:null, editCatIsNew:false,
  qrSessId:null,
  dashView:'single', // 'single' | 'trend'
  // form
  sessionId:null, sessionSetup:null,
  form:{page:0,name:'',dept:'',scores:{},notes:{},anomaly:null,overallLike:0,buyIntent:null,finalNote:''}
};

// ── Admin PIN ──
function loadPin(){const p=localStorage.getItem('pp_pin');if(p)S.adminPin=p;}
function savePin(){localStorage.setItem('pp_pin',S.adminPin);}

// ── Header tap ──
let tapN=0,tapT=null;
function headerTap(){
  if(S.adminOK)return;
  tapN++;clearTimeout(tapT);
  tapT=setTimeout(()=>tapN=0,2000);
  if(tapN>=5){tapN=0;S.adminPrompt=true;render();}
}
function renderLogin(){
  return`
    <div style="text-align:center;padding:48px 20px 32px">
      <div style="width:64px;height:64px;background:var(--accent-l);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center">
        <span style="font-size:28px">🏷️</span>
      </div>
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">品評表單系統</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:32px">請輸入管理員 PIN 碼進入後台</div>
      <input type="password" id="adm-pin" placeholder="••••" maxlength="8"
        onkeydown="if(event.key==='Enter')verifyAdmin()"
        style="width:180px;display:block;margin:0 auto 10px;padding:14px;text-align:center;font-size:22px;letter-spacing:.3em;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;background:var(--bg)">
      ${S.adminErr?`<div style="font-size:12px;color:var(--danger);margin-bottom:8px">PIN 碼錯誤，請再試一次</div>`:''}
      <button class="btn btn-p" onclick="verifyAdmin()" style="width:180px;margin:0 auto">進入後台</button>
      <div style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border)">
        <div style="font-size:12px;color:var(--hint)">品評者請掃描現場 QR Code 填寫表單</div>
      </div>
    </div>`;
}

function verifyAdmin(){
  const el=document.getElementById('adm-pin');if(!el)return;
  if(el.value===S.adminPin){
    S.adminOK=true;S.adminPrompt=false;S.adminErr=false;
    S.tab='list';
    loadAll().then(()=>render());
  } else {
    S.adminErr=true;
  }
  render();
}
function exitAdmin(){S.adminOK=false;S.tab='login';render();scrollTo(0,0);}

// ── Load ──
async function loadAll(){
  try{
    const [cats,sess,resp]=await Promise.all([fbGet('categories'),fbGet('sessions'),fbGet('responses')]);
    S.categories=cats||{};
    S.sessions=sess||{};
    S.responses={};
    if(resp)Object.entries(resp).forEach(([sid,rs])=>{S.responses[sid]=Object.values(rs);});
    // 若無分類，初始化預設
    if(Object.keys(S.categories).length===0){
      for(let i=0;i<DEFAULT_CATS.length;i++){
        const id='cat'+Date.now()+i;
        S.categories[id]={name:DEFAULT_CATS[i],color:CAT_COLORS[DEFAULT_CATS[i]]||'#374151',order:i};
        await fbSet(`categories/${id}`,S.categories[id]);
      }
    }
  }catch(e){console.error(e);}
}
async function loadSessionSetup(sid){
  try{S.sessionSetup=await fbGet(`sessions/${sid}`);}catch(e){S.sessionSetup=null;}
  updateHeader();render();
}

// ── Categories ──
function sortedCats(){return Object.entries(S.categories).sort((a,b)=>(a[1].order||0)-(b[1].order||0));}
function sessInCat(catId){return Object.entries(S.sessions).filter(([,s])=>s.catId===catId).sort((a,b)=>(a[1].roundNum||0)-(b[1].roundNum||0));}
function newCat(){S.editCat={id:'cat'+Date.now(),name:'',color:'#374151',order:Object.keys(S.categories).length};S.editCatIsNew=true;S.tab='editcat';render();}
async function saveCat(){
  const el=document.getElementById('cat-name');const cel=document.getElementById('cat-color');
  if(!el||!el.value.trim()){alert('請填入分類名稱');return;}
  S.editCat.name=el.value.trim();
  if(cel)S.editCat.color=cel.value;
  await fbSet(`categories/${S.editCat.id}`,S.editCat);
  S.categories[S.editCat.id]=S.editCat;
  S.savedBadge=true;S.tab='list';render();
  setTimeout(()=>{S.savedBadge=false;render();},2000);
}
async function deleteCat(id){
  const name=S.categories[id]?.name||'';
  const kids=sessInCat(id);
  if(kids.length>0){alert(`「${name}」分類下還有 ${kids.length} 個品評，請先刪除所有品評後再刪除分類。`);return;}
  if(!confirm(`確定刪除「${name}」分類？`))return;
  await fbDel(`categories/${id}`);
  delete S.categories[id];
  S.tab='list';render();
}

// ── Sessions ──
function nextRoundNum(catId){
  const rounds=sessInCat(catId).map(([,s])=>s.roundNum||0);
  return rounds.length>0?Math.max(...rounds)+1:1;
}
function newSess(catId){
  const cat=S.categories[catId];
  const roundNum=nextRoundNum(catId);
  S.editSess={id:'sess'+Date.now(),name:'',catId,catName:cat?.name||'',testDate:'',evalDate:'',enabledTastes:[],showAnomaly:true,roundNum,createdAt:Date.now()};
  S.editIsNew=true;S.tab='editsess';render();scrollTo(0,0);
}
function editSessFn(id){S.editSess=JSON.parse(JSON.stringify(S.sessions[id]));S.editIsNew=false;S.tab='editsess';render();scrollTo(0,0);}
function readSessFields(){
  const n=document.getElementById('ep-name');
  const td=document.getElementById('ep-testDate');
  const ed=document.getElementById('ep-evalDate');
  const rn=document.getElementById('ep-round');
  if(n)S.editSess.name=n.value;
  if(td)S.editSess.testDate=td.value;
  if(ed)S.editSess.evalDate=ed.value;
  if(rn)S.editSess.roundNum=parseInt(rn.value)||1;
}
function toggleEditTaste(t){readSessFields();const i=S.editSess.enabledTastes.indexOf(t);if(i>=0)S.editSess.enabledTastes.splice(i,1);else S.editSess.enabledTastes.push(t);render();}
function toggleEditAnomaly(){readSessFields();S.editSess.showAnomaly=!S.editSess.showAnomaly;render();}
async function doSaveSess(){
  readSessFields();
  if(!S.editSess.name.trim()){alert('請填入品評名稱');return;}
  await fbSet(`sessions/${S.editSess.id}`,S.editSess);
  S.sessions[S.editSess.id]=S.editSess;
  S.savedBadge=true;S.tab='list';
  if(!S.expandedCats[S.editSess.catId])S.expandedCats[S.editSess.catId]=true;
  render();setTimeout(()=>{S.savedBadge=false;render();},2000);
}
async function deleteSessFn(id){
  if(!confirm('確定刪除此品評？所有回應資料也會一併刪除。'))return;
  await fbDel(`sessions/${id}`);await fbDel(`responses/${id}`);
  delete S.sessions[id];delete S.responses[id];
  S.tab='list';render();
}

// ── Form ──
function getPages(){
  const cfg=S.sessionSetup;
  if(!cfg)return['填寫'];
  return['基本資訊','固定評分',...(cfg.enabledTastes||[]).map(t=>t+'評分'),'整體評估'];
}
function setScore(k,v){S.form.scores[k]=S.form.scores[k]===v?0:v;render();}
function setNA(k){S.form.scores[k]=S.form.scores[k]==='N/A'?0:'N/A';render();}
function setNoteVal(k,v){S.form.notes[k]=v;}
function setOverall(v){S.form.overallLike=S.form.overallLike===v?0:v;render();}
function setAnomalyVal(v){S.form.anomaly=S.form.anomaly===v?null:v;render();}
function setIntent(v){S.form.buyIntent=S.form.buyIntent===v?null:v;render();}
function nextPage(){
  const p=getPages();
  if(S.form.page<p.length-1){
    // 驗證當前頁必填
    if(!validatePage(S.form.page)) return;
    S.form.page++;render();scrollTo(0,0);
  }
}

function validatePage(page){
  const cfg=S.sessionSetup;
  const pages=getPages();
  const isLast=page===pages.length-1;

  if(page===0){
    if(!S.form.name.trim()){alert('請填寫姓名');return false;}
    if(!S.form.dept.trim()){alert('請選擇或填寫部門');return false;}
    return true;
  }

  if(page===1){
    // 固定評分：氣味/香氣、口感/酥脆、口感/黏牙
    for(const q of FIXED){
      const sc=S.form.scores[q];
      if(!sc||sc===0){alert(`請評分「${q}」（或選 N/A）`);return false;}
    }
    return true;
  }

  if(!isLast){
    // 滋味評分頁
    const taste=(cfg.enabledTastes||[])[page-2];
    if(taste){
      const sc=S.form.scores[taste];
      if(!sc||sc===0){alert(`請評分「${taste}度」（或選 N/A）`);return false;}
    }
    return true;
  }

  // 最後一頁：整體評估
  if(!S.form.overallLike||S.form.overallLike===0){alert('請評分「整體喜好」');return false;}
  if(!S.form.buyIntent){alert('請選擇「購買意願」');return false;}
  if(cfg.showAnomaly&&S.form.anomaly===null){alert('請選擇「是否有異味」');return false;}
  return true;
}
function prevPage(){if(S.form.page>0){S.form.page--;render();scrollTo(0,0);}}

async function submitForm(){
  const sid=S.sessionId;
  if(!sid){alert('找不到品評資訊，請重新掃碼');return;}
  if(!S.form.name.trim()){alert('請填寫姓名');return;}
  if(!S.form.dept.trim()){alert('請選擇或填寫部門');return;}
  if(!validatePage(S.form.page)){return;}
  function sanitize(obj){const r={};Object.entries(obj||{}).forEach(([k,v])=>{r[safeKey(k)]=v;});return r;}
  const resp={
    name:S.form.name||'匿名',dept:S.form.dept,
    scores:sanitize(S.form.scores),notes:sanitize(S.form.notes),
    anomaly:S.form.anomaly,overallLike:S.form.overallLike,
    buyIntent:S.form.buyIntent,finalNote:S.form.finalNote,
    ts:Date.now(),time:new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
  };
  try{
    const res=await fetch(`${FB}/responses/${sid}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(resp)});
    if(!res.ok)throw new Error('HTTP '+res.status+': '+(await res.text()));
    S.form={page:0,name:'',dept:'',scores:{},notes:{},anomaly:null,overallLike:0,buyIntent:null,finalNote:''};
    document.getElementById('content').innerHTML=`
      <div style="text-align:center;padding:50px 16px">
        <div style="font-size:48px;margin-bottom:14px">✓</div>
        <div style="font-size:19px;font-weight:700;color:var(--accent);margin-bottom:6px">品評已送出！</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px">感謝你的參與</div>
        <button class="btn btn-s btn-sm" onclick="S.form={page:0,name:'',dept:'',scores:{},notes:{},anomaly:null,overallLike:0,buyIntent:null,finalNote:''};render()" style="width:auto">再填一份</button>
      </div>`;
  }catch(e){alert('送出失敗：'+e.message);}
}

function calcAvgs(resp,allKeys){
  const avgs={};
  allKeys.forEach(k=>{
    const vals=resp.map(r=>(r.scores||{})[safeKey(k)]).filter(v=>v&&v!=='N/A'&&v>0);
    avgs[k]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  });
  return avgs;
}

function renderSingleDash(sid){
  const sess=S.sessions[sid];
  const resp=S.responses[sid]||[];
  const n=resp.length;
  const allKeys=[...FIXED,...(sess.enabledTastes||[])];
  if(n===0)return`<div class="empty">尚無品評資料</div><div style="text-align:center"><button class="btn btn-s btn-sm" onclick="refreshDash()" style="width:auto;margin-top:8px">↻ 重新整理</button></div>`;
  const avgs=calcAvgs(resp,allKeys);
  const overall=resp.reduce((a,r)=>a+(r.overallLike||0),0)/n;
  const buyPos=resp.filter(r=>['一定會買','可能會買'].includes(r.buyIntent)).length;
  const anomalyN=sess.showAnomaly?resp.filter(r=>r.anomaly===true).length:null;
  return`
    <div style="text-align:right;margin-bottom:8px"><button class="btn btn-s btn-sm" onclick="refreshDash()" style="width:auto">↻ 重新整理</button></div>
    <div class="metrics">
      <div class="metric"><div class="metric-val">${n}</div><div class="metric-lbl">品評人數</div></div>
      <div class="metric"><div class="metric-val">${overall.toFixed(1)}</div><div class="metric-lbl">整體喜好</div></div>
      <div class="metric"><div class="metric-val">${Math.round(buyPos/n*100)}%</div><div class="metric-lbl">購買正向率</div></div>
    </div>
    ${anomalyN!==null?(anomalyN>0?`<div class="tag tag-bad" style="display:block;margin-bottom:10px">⚠ ${anomalyN} 人反映有異味</div>`:`<div class="tag tag-ok" style="display:block;margin-bottom:10px">✓ 無異味反映</div>`):''}
    <div class="slabel">各項評分</div>
    <div class="card">${allKeys.map(k=>{const avg=avgs[k];if(avg===null)return'';const pct=Math.round((avg/5)*100),color=avg>=4?'#3A8A50':avg>=3?'#C07010':'#C0392B';return`<div class="bar-item"><div class="bar-lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-score">${avg.toFixed(1)}</div></div>`;}).join('')}</div>
    <div class="slabel">回應明細（${n} 筆）</div>
    ${resp.slice().reverse().map(r=>{const ne=Object.entries(r.notes||{}).filter(([,v])=>v);return`<div class="rcard">
      <div class="r-head"><div class="r-name">${r.name||'匿名'}${r.dept?' · '+r.dept:''}</div><div class="r-time">${r.time||''}</div></div>
      <div style="font-size:12px;color:var(--muted)">整體喜好 ${r.overallLike||0}★ ／ ${r.buyIntent||'未填'}${anomalyN!==null?(r.anomaly===true?' ／ <span class="tag tag-bad">有異味</span>':' ／ <span class="tag tag-ok">無異味</span>'):''}
      </div>
      ${ne.length||r.finalNote?`<div class="r-notes">${ne.map(([k,v])=>`<div><strong>${k}：</strong>${v}</div>`).join('')}${r.finalNote?`<div><strong>整體意見：</strong>${r.finalNote}</div>`:''}</div>`:''}
    </div>`;}).join('')}
    <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-s btn-sm" onclick="exportCSV('${sid}')" style="width:auto">↓ 匯出 CSV</button>
      <button class="btn btn-d btn-sm" onclick="clearRespFn('${sid}')" style="width:auto">清除數據</button>
    </div>`;
}

function renderTrendDash(catId){
  // 取得該分類下所有品評，按 roundNum 排序
  const siblings=sessInCat(catId).filter(([sid])=>S.responses[sid]&&S.responses[sid].length>0);
  if(siblings.length<2)return`<div class="empty">需要至少 2 次品評有數據才能顯示趨勢</div>`;
  const allKeys=[...FIXED,...(()=>{const s=S.sessions[siblings[0][0]];return s.enabledTastes||[];})()];
  // 選取要顯示的 key
  const activeKey=S.trendKey||allKeys[0];
  const points=siblings.map(([sid,sess])=>{
    const resp=S.responses[sid]||[];
    const avg=calcAvgs(resp,[activeKey])[activeKey];
    return{label:`第${sess.roundNum||'?'}次`,name:sess.name,avg,n:resp.length};
  });
  // SVG 趨勢圖
  const W=Math.max(300,siblings.length*60+60),H=160;
  const maxY=5,minY=1,padL=40,padR=20,padT=20,padB=30;
  const xStep=(W-padL-padR)/(points.length-1||1);
  function toX(i){return padL+i*xStep;}
  function toY(v){return padT+(maxY-v)/(maxY-minY)*(H-padT-padB);}
  let path='',dots='';
  points.forEach((pt,i)=>{
    if(pt.avg===null)return;
    const x=toX(i),y=toY(pt.avg);
    path+=(i===0?`M${x},${y}`:`L${x},${y}`);
    dots+=`<circle cx="${x}" cy="${y}" r="5" fill="#2D5A3D"/>
      <text x="${x}" y="${y-10}" text-anchor="middle" font-size="11" fill="#2D5A3D" font-weight="700">${pt.avg.toFixed(1)}</text>`;
  });
  const gridLines=[1,2,3,4,5].map(v=>`<line x1="${padL}" y1="${toY(v)}" x2="${W-padR}" y2="${toY(v)}" stroke="#E8E5DF" stroke-width="1"/>
    <text x="${padL-5}" y="${toY(v)+4}" text-anchor="end" font-size="10" fill="#A8A8A5">${v}</text>`).join('');
  const xLabels=points.map((pt,i)=>`<text x="${toX(i)}" y="${H-5}" text-anchor="middle" font-size="10" fill="#6B6B68">${pt.label}</text>`).join('');
  const svg=`<svg class="trend-svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}
    <path d="${path}" fill="none" stroke="#2D5A3D" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${xLabels}
  </svg>`;
  return`
    <div class="slabel">趨勢分析</div>
    <div class="card">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">選擇評分項目：</div>
      <div class="trend-tabs">${allKeys.map(k=>`<button class="trend-tab ${activeKey===k?'active':''}" onclick="S.trendKey='${k}';render()">${k}</button>`).join('')}</div>
      <div class="trend-wrap">${svg}</div>
    </div>
    <div class="slabel">各次品評摘要</div>
    ${siblings.map(([sid,sess])=>{
      const resp=S.responses[sid]||[];
      const overall=resp.length?resp.reduce((a,r)=>a+(r.overallLike||0),0)/resp.length:null;
      return`<div class="round-row" onclick="S.currentSessId='${sid}';S.dashView='single';render()">
        <div class="round-num">${sess.roundNum||'?'}</div>
        <div class="round-info">
          <div class="round-name">${sess.name}</div>
          <div class="round-meta">${sess.evalDate?sess.evalDate:''}${overall!==null?' · 整體喜好 '+overall.toFixed(1)+'★':''}</div>
        </div>
        <span class="round-count">${resp.length} 份</span>
      </div>`;
    }).join('')}
    <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-s btn-sm" onclick="exportTrendCSV('${catId}')" style="width:auto">↓ 匯出全部次數 CSV</button>
      <button class="btn btn-s btn-sm" onclick="exportTrendSummary('${catId}')" style="width:auto">↓ 匯出趨勢摘要 CSV</button>
    </div>`;
}

function renderDashboard(){
  const sid=S.currentSessId;
  const sess=S.sessions[sid];
  if(!sess)return`<div class="empty">找不到品評資料</div>`;
  const cat=S.categories[sess.catId];
  const color=cat?.color||'#374151';
  const siblings=sessInCat(sess.catId);
  const hasTrend=siblings.filter(([s])=>S.responses[s]&&S.responses[s].length>0).length>=2;

  if(!S.pinOK){
    setTimeout(()=>{const el=document.getElementById('pin-inp');if(el)el.focus();},100);
    return`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button class="btn btn-s btn-sm" onclick="S.tab='list';render()" style="width:auto">← 返回</button>
      </div>
      <div class="pin-page">
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${sess.name}</div>
        ${cat?`<div style="margin-bottom:14px"><span class="tag-cat" style="background:${color}22;color:${color}">${cat.name}${sess.roundNum?' · 第'+sess.roundNum+'次':''}</span></div>`:''}
        <div style="font-size:13px;color:var(--muted);margin-bottom:14px">請輸入管理員 PIN 碼</div>
        <input type="password" id="pin-inp" placeholder="••••" maxlength="8" onkeydown="if(event.key==='Enter')verifyDashPin()" class="pin-input" style="width:150px;display:block;margin:0 auto 10px">
        ${S.pinErr?`<div class="pin-error">PIN 碼錯誤</div>`:''}
        <button class="btn btn-p" onclick="verifyDashPin()" style="width:150px;margin:0 auto">確認</button>
      </div>`;
  }

  const backBtn=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-s btn-sm" onclick="S.tab='list';render()" style="width:auto">← 列表</button>
      <div>
        <div style="font-weight:700;font-size:14px">${sess.name}</div>
        ${cat?`<span class="tag-cat" style="background:${color}22;color:${color};margin-top:2px;display:inline-block">${cat.name}${sess.roundNum?' · 第'+sess.roundNum+'次':''}</span>`:''}
      </div>
    </div>
    ${hasTrend?`<div style="display:flex;gap:4px">
      <button class="btn btn-xs ${S.dashView==='single'?'btn-p':'btn-s'}" onclick="S.dashView='single';render()" style="width:auto">單次</button>
      <button class="btn btn-xs ${S.dashView==='trend'?'btn-p':'btn-s'}" onclick="S.dashView='trend';render()" style="width:auto">趨勢</button>
    </div>`:''}
  </div>`;

  return backBtn+(S.dashView==='trend'?renderTrendDash(sess.catId):renderSingleDash(sid));
}

function exportCSV(sid){
  const sess=S.sessions[sid],resp=S.responses[sid]||[];
  const keys=[...FIXED,...(sess.enabledTastes||[])];
  const h=['姓名','部門','時間','整體喜好','購買意願',...(sess.showAnomaly?['是否有異味']:[]),...keys.map(k=>k+'評分'),...keys.map(k=>k+'意見'),'整體意見'];
  const rows=resp.map(r=>[r.name,r.dept,r.time,r.overallLike,r.buyIntent||'',...(sess.showAnomaly?[r.anomaly===true?'有':r.anomaly===false?'無':'']:[]),...keys.map(k=>(r.scores||{})[safeKey(k)]||''),...keys.map(k=>(r.notes&&r.notes[safeKey(k)])||''),r.finalNote||'']);
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`品評_${sess.catName||''}_${sess.name}_${new Date().toLocaleDateString('zh-TW')}.csv`;
  a.click();
}

// 趨勢匯出：所有次數的原始回應合併（加上「第幾次」欄位）
function exportTrendCSV(catId){
  const cat=S.categories[catId];
  const siblings=sessInCat(catId).filter(([sid])=>S.responses[sid]&&S.responses[sid].length>0);
  if(siblings.length===0){alert('尚無數據可匯出');return;}
  // 收集所有出現過的 keys
  const keySet=new Set([...FIXED]);
  siblings.forEach(([sid,sess])=>(sess.enabledTastes||[]).forEach(t=>keySet.add(t)));
  const keys=[...keySet];
  const h=['次數','品評名稱','品評日期','姓名','部門','時間','整體喜好','購買意願','是否有異味',...keys.map(k=>k+'評分'),...keys.map(k=>k+'意見'),'整體意見'];
  const rows=[];
  siblings.forEach(([sid,sess])=>{
    (S.responses[sid]||[]).forEach(r=>{
      rows.push([
        sess.roundNum||'',sess.name,sess.evalDate||'',
        r.name,r.dept,r.time,r.overallLike,r.buyIntent||'',
        r.anomaly===true?'有':r.anomaly===false?'無':'',
        ...keys.map(k=>(r.scores||{})[safeKey(k)]||''),
        ...keys.map(k=>(r.notes&&r.notes[safeKey(k)])||''),
        r.finalNote||''
      ]);
    });
  });
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`趨勢_全部回應_${cat?.name||''}_${new Date().toLocaleDateString('zh-TW')}.csv`;
  a.click();
}

// 趨勢摘要：每次品評的各項平均分（一次一行，適合做圖表）
function exportTrendSummary(catId){
  const cat=S.categories[catId];
  const siblings=sessInCat(catId).filter(([sid])=>S.responses[sid]&&S.responses[sid].length>0);
  if(siblings.length===0){alert('尚無數據可匯出');return;}
  const keySet=new Set([...FIXED]);
  siblings.forEach(([sid,sess])=>(sess.enabledTastes||[]).forEach(t=>keySet.add(t)));
  const keys=[...keySet];
  const h=['次數','品評名稱','品評日期','回應人數','整體喜好均分','購買正向率(%)','有異味人數',...keys.map(k=>k+'均分')];
  const rows=siblings.map(([sid,sess])=>{
    const resp=S.responses[sid]||[];
    const n=resp.length;
    const overall=n?resp.reduce((a,r)=>a+(r.overallLike||0),0)/n:0;
    const buyPos=resp.filter(r=>['一定會買','可能會買'].includes(r.buyIntent)).length;
    const anomaly=resp.filter(r=>r.anomaly===true).length;
    const avgs=calcAvgs(resp,keys);
    return[
      sess.roundNum||'',sess.name,sess.evalDate||'',n,
      overall?overall.toFixed(2):'',
      n?Math.round(buyPos/n*100):'',
      anomaly,
      ...keys.map(k=>avgs[k]!==null?avgs[k].toFixed(2):'')
    ];
  });
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`趨勢_摘要均分_${cat?.name||''}_${new Date().toLocaleDateString('zh-TW')}.csv`;
  a.click();
}

function updateHeader(){
  const cfg=S.sessionSetup;
  if(S.adminOK){document.getElementById('h-title').textContent='品評管理後台';document.getElementById('h-sub').textContent='管理員模式';}
  else if(S.tab==='login'){document.getElementById('h-title').textContent='品評表單系統';document.getElementById('h-sub').textContent='管理員後台';}
  else if(cfg){document.getElementById('h-title').textContent=cfg.name||'品評表單';document.getElementById('h-sub').textContent=cfg.catName?(cfg.catName+(cfg.roundNum?' · 第'+cfg.roundNum+'次':'')):'歡迎參與品評';}
  else{document.getElementById('h-title').textContent='品評表單';document.getElementById('h-sub').textContent='載入中...';}
}

function render(){
  const nav=document.getElementById('nav');
  if(S.adminOK){
    nav.style.display='';
    const tabs=[
      {id:'list',label:'📋 品評列表'},
      {id:'editcat',label:'✎ 分類',hide:!S.editCat},
      {id:'editsess',label:'✎ 品評',hide:!S.editSess},
      {id:'qr',label:'▣ QR碼',hide:!S.qrSessId},
      {id:'dashboard',label:'◉ 後台',hide:!S.currentSessId}
    ].filter(t=>!t.hide);
    nav.innerHTML=tabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';render();scrollTo(0,0)">${t.label}</button>`).join('')
      +`<button class="nav-btn red" onclick="exitAdmin()">✕ 離開</button>`;
  }else{nav.style.display='none';}
  updateHeader();
  const c=document.getElementById('content');
  let html='';
  if(S.adminPrompt)html+=renderAdminPrompt();
  if(S.adminOK){
    if(S.tab==='list')html+=renderList();
    else if(S.tab==='editcat')html+=renderEditCat();
    else if(S.tab==='editsess')html+=renderEditSess();
    else if(S.tab==='qr')html+=renderQR();
    else if(S.tab==='dashboard')html+=renderDashboard();
  } else if(S.tab==='login'){
    html+=renderLogin();
  } else {
    html+=renderForm();
  }
  c.innerHTML=html;
}

async function init(){
  loadPin();
  const sid=getSid();
  if(sid){
    // 品評者模式：有 session ID，載入表單
    S.sessionId=sid;
    S.tab='form';
    render(); // 先顯示載入中
    loadSessionSetup(sid);
  }else{
    // 無 session ID：直接顯示管理員登入
    S.tab='login';
    render();
  }
  loadAll().then(()=>{if(S.adminOK)render();});
}
init();
</script>
