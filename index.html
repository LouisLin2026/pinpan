<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>品評表單系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBxnHJ2dElY6fJkkx-o7oHFJJBz7CbeYo",
    authDomain: "evaluation-survey-form.firebaseapp.com",
    databaseURL: "https://evaluation-survey-form-default-rtdb.firebaseio.com",
    projectId: "evaluation-survey-form",
    storageBucket: "evaluation-survey-form.firebasestorage.app",
    messagingSenderId: "884166116394",
    appId: "1:884166116394:web:92a505b03ba5e5ed31ef53"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db;
  window._ref = ref;
  window._push = push;
  window._onValue = onValue;
  window._set = set;
  window._remove = remove;
  window._get = get;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
:root {
  --bg:#FAFAF8;--surface:#fff;--border:#E8E5DF;--border-s:#C8C5BE;
  --text:#1A1A18;--muted:#6B6B68;--hint:#A8A8A5;
  --accent:#2D5A3D;--accent-l:#EAF2EC;--accent-t:#1A3D27;
  --star:#D4920A;--danger:#C0392B;--danger-l:#FBEAE8;
  --warn:#B8690A;--warn-l:#FEF3E2;--radius:10px;--radius-s:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
.app{max-width:520px;margin:0 auto;padding-bottom:80px}
.header{background:var(--accent);color:#fff;padding:18px 20px 14px;cursor:default;user-select:none}
.h-title{font-size:16px;font-weight:700}
.h-sub{font-size:12px;opacity:.75;margin-top:2px}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:64px;padding:11px 6px 9px;border:none;background:none;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.nav-btn.danger{color:var(--danger)}
.content{padding:18px 16px}
.slabel{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;font-size:15px;background:var(--bg);color:var(--text);appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:72px}
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.chip{padding:8px 4px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:13px;font-family:inherit;text-align:center;cursor:pointer;color:var(--muted);background:var(--bg);transition:all .15s;user-select:none}
.chip.on{background:var(--accent-l);color:var(--accent-t);border-color:var(--accent);font-weight:700}
.chip.red.on{background:var(--danger-l);color:var(--danger);border-color:var(--danger)}
.star-block{margin-bottom:10px}.star-block:last-child{margin-bottom:0}
.star-q{font-size:14px;font-weight:500;margin-bottom:8px}
.star-row{display:flex;align-items:center;gap:6px}
.stars{display:flex;gap:4px}
.star{font-size:28px;cursor:pointer;color:#DDD;transition:color .1s,transform .1s;user-select:none;line-height:1}
.star.lit{color:var(--star)}.star:active{transform:scale(1.2)}
.na-btn{font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--muted);background:none;font-family:inherit}
.na-btn.on{background:var(--border)}
.note-hint{font-size:12px;color:var(--hint);margin:6px 0 4px}
.note-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);resize:none}
.note-input:focus{outline:none;border-color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.choice-group{display:flex;flex-wrap:wrap;gap:6px}
.choice-btn{padding:8px 14px;border:1px solid var(--border);border-radius:20px;font-family:inherit;font-size:13px;cursor:pointer;background:var(--bg);color:var(--muted);transition:all .15s}
.choice-btn.sel{background:var(--accent-l);border-color:var(--accent);color:var(--accent-t);font-weight:700}
.choice-btn.red.sel{background:var(--danger-l);border-color:var(--danger);color:var(--danger)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--accent);color:#fff;width:100%}.btn-p:active{opacity:.85}
.btn-s{background:none;border:1px solid var(--border-s);color:var(--text);font-weight:500}
.btn-d{background:var(--danger-l);color:var(--danger);border:1px solid #E8A09A;font-weight:500}
.btn-sm{padding:8px 16px;font-size:13px;font-weight:500}
.page-nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:10px}
.page-info{font-size:12px;color:var(--hint);text-align:center}
.dots{display:flex;gap:5px;justify-content:center;margin-top:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border-s)}
.dot.active{background:var(--accent)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center}
.metric-val{font-size:22px;font-weight:700;color:var(--accent)}
.metric-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:13px;width:72px;flex-shrink:0;color:var(--muted)}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-score{font-size:12px;width:26px;text-align:right;color:var(--muted)}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.tag-ok{background:var(--accent-l);color:var(--accent-t)}
.tag-bad{background:var(--danger-l);color:var(--danger)}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.r-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.r-name{font-weight:700;font-size:14px}
.r-time{font-size:11px;color:var(--hint)}
.r-notes{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.pin-box{background:var(--surface);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.pin-title{font-size:16px;font-weight:700;margin-bottom:4px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.pin-input{width:100%;padding:14px;text-align:center;font-size:24px;letter-spacing:.3em;border:1px solid var(--border);border-radius:var(--radius-s);font-family:inherit;margin-bottom:12px;background:var(--bg)}
.pin-error{font-size:12px;color:var(--danger);margin-bottom:8px}
.notice{background:var(--accent-l);border:1px solid #B8D4BE;border-radius:var(--radius-s);padding:12px 14px;font-size:13px;color:var(--accent-t);margin-bottom:12px}
.saved-pill{display:inline-block;background:var(--accent-l);color:var(--accent-t);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:10px}
.empty{text-align:center;padding:40px 20px;color:var(--hint);font-size:14px}

/* Session list */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.scard:hover{border-color:var(--accent)}
.scard-info{flex:1}
.scard-name{font-weight:700;font-size:15px}
.scard-meta{font-size:12px;color:var(--muted);margin-top:2px}
.scard-count{background:var(--accent-l);color:var(--accent-t);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.scard-arrow{color:var(--hint);font-size:18px}
.badge-new{background:var(--warn-l);color:var(--warn);font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}
.qr-wrap{text-align:center;padding:8px 0}
.qr-img{width:200px;height:200px;border-radius:var(--radius);border:1px solid var(--border)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content>*{animation:fadeIn .2s ease}
</style>
</head>
<body>
<div class="app">
  <div class="header" onclick="headerTap()">
    <div class="h-title" id="h-title">品評表單系統</div>
    <div class="h-sub" id="h-sub">載入中...</div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="content" id="content"></div>
</div>

<script>
const TASTES=['鹹','甜','辣','辛/嗆','油','苦','茶','奶','焦','澀','酸','果香','咖啡','香料'];
const FIXED=['氣味/香氣','口感/酥脆','口感/黏牙'];
const ADMIN_PIN_KEY='pinpan_admin_pin';
const BASE_URL = location.href.split('?')[0].split('#')[0];

let fb = false;

// URL 中讀取 session id
function getSessionId() {
  return new URLSearchParams(location.search).get('s');
}

let S = {
  tab: 'form',         // 品評者預設：form；管理員預設：sessions
  adminOK: false,
  adminPrompt: false,
  adminErr: false,
  pinOK: false,
  pinErr: false,
  savedBadge: false,
  adminPin: '1234',

  // 管理員端
  sessions: {},        // { id: { product, testDate, evalDate, enabledTastes, showAnomaly, pin, createdAt } }
  currentSession: null, // 正在查看的 session id（後台）
  editSession: null,   // 正在編輯的 session（新增/修改）
  editIsNew: false,
  responses: {},       // { sessionId: [resp, ...] }

  // 品評者端
  sessionId: null,     // 從 URL 讀取
  sessionSetup: null,  // 對應 session 的設定
  form: { page:0, name:'', dept:'', scores:{}, notes:{}, anomaly:null, overallLike:0, buyIntent:null, finalNote:'' }
};

// ── Firebase helpers ──
function fbRef(path) { return window._ref(window._db, path); }
async function fbSet(path, val) { await window._set(fbRef(path), val); }
async function fbPush(path, val) { return await window._push(fbRef(path), val); }
function fbListen(path, cb) { window._onValue(fbRef(path), snap => cb(snap.val())); }
async function fbRemove(path) { await window._remove(fbRef(path)); }

// ── 管理員 PIN ──
function loadAdminPin() {
  const p = localStorage.getItem(ADMIN_PIN_KEY);
  if (p) S.adminPin = p;
}
function saveAdminPin() {
  localStorage.setItem(ADMIN_PIN_KEY, S.adminPin);
}

// ── Header tap (5次進管理) ──
let tapCount=0, tapTimer=null;
function headerTap() {
  if (S.adminOK) return;
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(()=>tapCount=0, 2000);
  if (tapCount >= 5) { tapCount=0; S.adminPrompt=true; render(); }
}

function verifyAdmin() {
  const el = document.getElementById('adm-pin');
  if (!el) return;
  if (el.value === S.adminPin) {
    S.adminOK=true; S.adminPrompt=false; S.adminErr=false;
    S.tab='sessions';
  } else { S.adminErr=true; }
  render();
}

function exitAdmin() {
  S.adminOK=false; S.tab='form'; render(); scrollTo(0,0);
}

// ── Sessions (管理員) ──
function listenSessions() {
  fbListen('sessions', data => {
    S.sessions = data || {};
    if (S.adminOK) render();
  });
}

function listenAllResponses() {
  fbListen('responses', data => {
    S.responses = {};
    if (data) {
      Object.entries(data).forEach(([sid, resps]) => {
        S.responses[sid] = Object.values(resps);
      });
    }
    if (S.adminOK) render();
  });
}

async function saveSession(sess) {
  await fbSet(`sessions/${sess.id}`, sess);
}

async function deleteSession(id) {
  if (!confirm('確定刪除此品評？已收集的回應也會一併刪除。')) return;
  await fbRemove(`sessions/${id}`);
  await fbRemove(`responses/${id}`);
  S.currentSession = null;
  render();
}

// ── 品評者：從 URL 載入 session ──
function listenSessionSetup(sid) {
  fbListen(`sessions/${sid}`, data => {
    S.sessionSetup = data;
    updateHeader();
    if (S.tab==='form') render();
  });
}

// ── 表單填寫 ──
function getPages() {
  const cfg = S.adminOK ? S.editSession : S.sessionSetup;
  if (!cfg) return ['填寫'];
  return ['基本資訊','固定評分',...(cfg.enabledTastes||[]).map(t=>t+'評分'),'整體評估'];
}

function setScore(k,v){ S.form.scores[k]=S.form.scores[k]===v?0:v; render(); }
function setNA(k){ S.form.scores[k]=S.form.scores[k]==='N/A'?0:'N/A'; render(); }
function setNoteVal(k,v){ S.form.notes[k]=v; }
function setOverall(v){ S.form.overallLike=S.form.overallLike===v?0:v; render(); }
function setAnomalyVal(v){ S.form.anomaly=S.form.anomaly===v?null:v; render(); }
function setIntent(v){ S.form.buyIntent=S.form.buyIntent===v?null:v; render(); }
function nextPage(){ const p=getPages(); if(S.form.page<p.length-1){S.form.page++;render();scrollTo(0,0);} }
function prevPage(){ if(S.form.page>0){S.form.page--;render();scrollTo(0,0);} }

async function submitForm() {
  const sid = S.sessionId;
  if (!sid) return alert('找不到品評資訊，請重新掃碼');
  const resp = {
    name: S.form.name||'匿名', dept: S.form.dept,
    scores:{...S.form.scores}, notes:{...S.form.notes},
    anomaly: S.form.anomaly, overallLike: S.form.overallLike,
    buyIntent: S.form.buyIntent, finalNote: S.form.finalNote,
    ts: Date.now(),
    time: new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
  };
  try { await fbPush(`responses/${sid}`, resp); } catch(e) { alert('送出失敗，請檢查網路'); return; }
  S.form={page:0,name:'',dept:'',scores:{},notes:{},anomaly:null,overallLike:0,buyIntent:null,finalNote:''};
  document.getElementById('content').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:52px;margin-bottom:16px">✓</div>
      <div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px">品評已送出！</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:24px">感謝你的參與</div>
      <button class="btn btn-s btn-sm" onclick="S.form={page:0,name:'',dept:'',scores:{},notes:{},anomaly:null,overallLike:0,buyIntent:null,finalNote:''};render()" style="width:auto">再填一份</button>
    </div>`;
}

// ── 管理員 session 編輯 ──
function newSession() {
  S.editSession = {
    id: 'sess_' + Date.now(),
    product:'', testDate:'', evalDate:'',
    enabledTastes:[], showAnomaly:true,
    createdAt: Date.now()
  };
  S.editIsNew = true;
  S.tab = 'edit';
  render(); scrollTo(0,0);
}

function editSession(id) {
  S.editSession = JSON.parse(JSON.stringify(S.sessions[id]));
  S.editIsNew = false;
  S.tab = 'edit';
  render(); scrollTo(0,0);
}

function readEditFields() {
  ['ep-product','ep-testDate','ep-evalDate'].forEach(id => {
    const el=document.getElementById(id);
    if (el) {
      const k = id.replace('ep-','');
      S.editSession[k] = el.value;
    }
  });
}

function toggleEditTaste(t) {
  readEditFields();
  const i=S.editSession.enabledTastes.indexOf(t);
  if(i>=0) S.editSession.enabledTastes.splice(i,1);
  else S.editSession.enabledTastes.push(t);
  render();
}

function toggleEditAnomaly() {
  readEditFields();
  S.editSession.showAnomaly=!S.editSession.showAnomaly;
  render();
}

async function doSaveSession() {
  readEditFields();
  if (!S.editSession.product.trim()) { alert('請填入產品名稱'); return; }
  await saveSession(S.editSession);
  S.savedBadge=true;
  S.tab='sessions';
  render();
  setTimeout(()=>{S.savedBadge=false;render();},2500);
}

// ── 後台分析 ──
function openDashboard(sid) {
  S.currentSession=sid; S.pinOK=false; S.pinErr=false;
  S.tab='dashboard'; render(); scrollTo(0,0);
}

function verifyDashPin() {
  const el=document.getElementById('pin-inp');
  if (!el) return;
  const sess = S.sessions[S.currentSession];
  const pin = (sess && sess.pin) ? sess.pin : S.adminPin;
  if (el.value===pin){S.pinOK=true;S.pinErr=false;}
  else{S.pinErr=true;}
  render();
}

// ── Render helpers ──
function starBlock(key, label, allowNA) {
  const sc=S.form.scores[key]||0; const isNA=sc==='N/A';
  let stars='';
  for(let i=1;i<=5;i++) stars+=`<span class="star ${!isNA&&sc>=i?'lit':''}" onclick="setScore('${key}',${i})">★</span>`;
  return `<div class="star-block">
    <div class="star-q">${label}</div>
    <div class="star-row"><div class="stars">${stars}</div>${allowNA?`<button class="na-btn ${isNA?'on':''}" onclick="setNA('${key}')">N/A</button>`:''}</div>
    <div class="note-hint">意見（選填）</div>
    <textarea class="note-input" rows="2" placeholder="輸入意見..." oninput="setNoteVal('${key}',this.value)">${S.form.notes[key]||''}</textarea>
  </div>`;
}

// ════════════════════════════════
// RENDER FUNCTIONS
// ════════════════════════════════

function renderAdminPrompt() {
  return `<div class="overlay">
    <div class="pin-box">
      <div class="pin-title">管理員登入</div>
      <div class="pin-sub">連點標題 5 下後輸入 PIN</div>
      <input class="pin-input" type="password" id="adm-pin" placeholder="••••" maxlength="8" onkeydown="if(event.key==='Enter')verifyAdmin()">
      ${S.adminErr?`<div class="pin-error">PIN 碼錯誤</div>`:''}
      <button class="btn btn-p" onclick="verifyAdmin()" style="margin-bottom:10px">確認</button>
      <button class="btn btn-s" onclick="S.adminPrompt=false;render()" style="font-size:13px">取消</button>
    </div>
  </div>`;
}

// 管理員：品評列表
function renderSessions() {
  const ids = Object.keys(S.sessions);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="slabel" style="margin:0">品評列表</div>
      <button class="btn btn-p btn-sm" onclick="newSession()" style="width:auto">＋ 新增品評</button>
    </div>
    ${S.savedBadge?`<div class="notice">✓ 已儲存並同步</div>`:''}
    ${ids.length===0?`<div class="empty">尚無品評<br><span style="font-size:13px">點右上角「新增品評」開始</span></div>`:''}
    ${ids.map(id=>{
      const s=S.sessions[id];
      const count=(S.responses[id]||[]).length;
      return `<div class="scard" onclick="openDashboard('${id}')">
        <div class="scard-info">
          <div class="scard-name">${s.product||'（未命名）'}</div>
          <div class="scard-meta">${s.evalDate?'品評日：'+s.evalDate:''} ${s.enabledTastes&&s.enabledTastes.length?'・'+s.enabledTastes.join('、'):''}</div>
        </div>
        <div class="scard-count">${count} 份</div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <button class="btn btn-s btn-sm" onclick="event.stopPropagation();editSession('${id}')" style="width:auto;font-size:12px;padding:5px 10px">編輯</button>
          <button class="btn btn-sm" onclick="event.stopPropagation();showQR('${id}')" style="width:auto;font-size:12px;padding:5px 10px;background:var(--accent-l);color:var(--accent-t);border:1px solid var(--accent);font-weight:700">QR碼</button>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="slabel">管理員 PIN 碼</div>
      <div class="card">
        <div class="field">
          <label>PIN 碼（用於進入管理介面）</label>
          <input type="password" id="global-pin" value="${S.adminPin}" style="max-width:160px">
        </div>
        <button class="btn btn-s btn-sm" onclick="const el=document.getElementById('global-pin');if(el&&el.value){S.adminPin=el.value;saveAdminPin();alert('PIN 已更新');}">儲存 PIN</button>
      </div>
    </div>`;
}

// 管理員：新增/編輯品評
function renderEdit() {
  const s=S.editSession;
  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn btn-s btn-sm" onclick="S.tab='sessions';render()" style="width:auto">← 返回</button>
      <div style="font-weight:700">${S.editIsNew?'新增品評':'編輯品評'}</div>
    </div>
    <div class="slabel">產品資訊</div>
    <div class="card">
      <div class="field"><label>產品名稱 *</label><input id="ep-product" type="text" value="${s.product}" placeholder="例：海苔鹹餅乾 #3"></div>
      <div class="field"><label>試製日期</label><input id="ep-testDate" type="date" value="${s.testDate||''}"></div>
      <div class="field"><label>品評日期</label><input id="ep-evalDate" type="date" value="${s.evalDate||''}"></div>
    </div>
    <div class="slabel">本次啟用的滋味項目</div>
    <div class="card">
      <div class="chips">${TASTES.map(t=>`<button class="chip ${s.enabledTastes.includes(t)?'on':''}" onclick="toggleEditTaste('${t}')">${t}</button>`).join('')}</div>
      <div style="margin-top:10px;font-size:12px;color:var(--hint)">已選 ${s.enabledTastes.length} 項</div>
    </div>
    <div class="slabel">可選評估項目</div>
    <div class="card">
      <button class="chip red ${s.showAnomaly?'on':''}" onclick="toggleEditAnomaly()" style="width:auto;padding:8px 16px">異味檢測</button>
      <div style="margin-top:8px;font-size:12px;color:var(--hint)">整體喜好、購買意願為固定末端項目</div>
    </div>
    <button class="btn btn-p" onclick="doSaveSession()">✓ 儲存並產生 QR Code</button>
    ${!S.editIsNew?`<button class="btn btn-d" onclick="deleteSession('${s.id}')" style="margin-top:8px">刪除此品評</button>`:''}`;
}

// QR Code 頁（管理員點 QR碼按鈕）
let _qrSessionId = null;
function showQR(sid) {
  _qrSessionId=sid; S.tab='qr'; render(); scrollTo(0,0);
}

function renderQR() {
  const sid = _qrSessionId;
  const s = sid ? S.sessions[sid] : null;
  if (!s) return `<div class="empty">找不到品評資訊</div>`;
  const url = `${BASE_URL}?s=${sid}`;
  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;
  const count = (S.responses[sid]||[]).length;
  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn btn-s btn-sm" onclick="S.tab='sessions';render()" style="width:auto">← 返回</button>
    </div>
    <div class="notice">品評者掃碼後直接在手機填寫，資料自動集中</div>
    <div class="card qr-wrap">
      <img class="qr-img" src="${qr}" alt="QR Code">
      <div style="font-size:16px;font-weight:700;margin-top:12px">${s.product}</div>
      ${s.evalDate?`<div style="font-size:12px;color:var(--muted);margin-top:4px">品評日期：${s.evalDate}</div>`:''}
      ${s.enabledTastes&&s.enabledTastes.length?`<div style="font-size:12px;color:var(--muted);margin-top:2px">評分項目：${s.enabledTastes.join('、')}</div>`:''}
      <div style="font-size:12px;color:var(--muted);margin-top:4px">已收集 ${count} 份回應</div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <a href="${qr}" download="QRCode_${s.product}.png"><button class="btn btn-s btn-sm" style="width:auto">↓ 下載圖片</button></a>
        <button class="btn btn-s btn-sm" onclick="window.print()" style="width:auto">列印</button>
      </div>
    </div>
    <div class="card" style="font-size:13px;color:var(--muted)">
      <div style="font-weight:700;color:var(--text);margin-bottom:6px">表單連結</div>
      <div style="word-break:break-all;font-family:monospace;font-size:12px;background:var(--bg);padding:8px;border-radius:var(--radius-s)">${url}</div>
    </div>`;
}

// 品評者填寫
function renderForm() {
  const cfg = S.sessionSetup;
  if (!cfg) return `<div class="empty">載入中...<br><span style="font-size:13px">請確認網路連線</span></div>`;

  const pages=getPages();
  const p=S.form.page;
  const isLast=p===pages.length-1;
  let body='';

  if(p===0){
    body=`<div class="slabel">基本資訊</div><div class="card">
      <div class="field"><label>姓名</label><input type="text" value="${S.form.name}" placeholder="您的姓名" oninput="S.form.name=this.value"></div>
      <div class="field"><label>部門（選填）</label><input type="text" value="${S.form.dept}" placeholder="例：研發部" oninput="S.form.dept=this.value"></div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">品評產品：<strong style="color:var(--text)">${cfg.product}</strong></div>
    </div>`;
  } else if(p===1){
    body=`<div class="slabel">固定評分</div><div class="card">
      ${FIXED.map((q,i)=>(i?'<hr class="divider">':'')+starBlock(q,q,true)).join('')}
    </div>`;
  } else if(!isLast){
    const taste=(cfg.enabledTastes||[])[p-2];
    body=`<div class="slabel">${taste} 滋味評分</div><div class="card">${starBlock(taste,taste+'度',false)}</div>`;
  } else {
    body=`<div class="slabel">整體評估</div><div class="card">
      <div class="star-q">整體喜好</div>
      <div class="stars" style="margin-bottom:16px">${[1,2,3,4,5].map(i=>`<span class="star ${S.form.overallLike>=i?'lit':''}" onclick="setOverall(${i})">★</span>`).join('')}</div>
      <hr class="divider">
      <div class="star-q">購買意願</div>
      <div class="choice-group" style="margin-bottom:16px">
        ${['一定會買','可能會買','猶豫中','可能不買','不會買'].map(v=>`<button class="choice-btn ${S.form.buyIntent===v?'sel':''}" onclick="setIntent('${v}')">${v}</button>`).join('')}
      </div>
      ${cfg.showAnomaly?`<hr class="divider">
      <div class="star-q">是否有異味？</div>
      <div class="choice-group" style="margin-bottom:16px">
        <button class="choice-btn ${S.form.anomaly===false?'sel':''}" onclick="setAnomalyVal(false)">✓ 無異味</button>
        <button class="choice-btn red ${S.form.anomaly===true?'sel':''}" onclick="setAnomalyVal(true)">✗ 有異味</button>
      </div>`:''}
      <hr class="divider">
      <div class="star-q">整體意見</div>
      <textarea class="note-input" rows="4" placeholder="整體感受、建議..." oninput="S.form.finalNote=this.value" style="margin-top:4px">${S.form.finalNote}</textarea>
    </div>`;
  }

  return body+`
    <div class="page-nav">
      <button class="btn btn-s" onclick="prevPage()" ${p===0?'disabled':''} style="opacity:${p===0?.3:1};flex:1;max-width:110px;font-size:14px">← 上一頁</button>
      <div><div class="page-info">${p+1} / ${pages.length}</div><div class="dots">${pages.map((_,i)=>`<div class="dot ${i===p?'active':''}"></div>`).join('')}</div></div>
      ${isLast
        ?`<button class="btn btn-p" onclick="submitForm()" style="flex:1;max-width:120px;font-size:14px">送出 ✓</button>`
        :`<button class="btn btn-p" onclick="nextPage()" style="flex:1;max-width:110px;font-size:14px">下一頁 →</button>`}
    </div>`;
}

// 後台數據
function renderDashboard() {
  const sid=S.currentSession;
  const sess=S.sessions[sid];
  if (!sess) return `<div class="empty">找不到品評資料</div>`;

  const backBtn=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn btn-s btn-sm" onclick="S.tab='sessions';render()" style="width:auto">← 返回列表</button>
    <div style="font-weight:700">${sess.product}</div>
  </div>`;

  if(!S.pinOK){
    return backBtn+`<div class="overlay">
      <div class="pin-box">
        <div class="pin-title">後台數據</div>
        <div class="pin-sub">${sess.product}</div>
        <input class="pin-input" type="password" id="pin-inp" placeholder="••••" maxlength="8" onkeydown="if(event.key==='Enter')verifyDashPin()">
        ${S.pinErr?`<div class="pin-error">PIN 碼錯誤</div>`:''}
        <button class="btn btn-p" onclick="verifyDashPin()">確認</button>
      </div>
    </div>`;
  }

  const resp=S.responses[sid]||[];
  const n=resp.length;
  if(n===0) return backBtn+`<div class="empty">尚無品評資料<br><span style="font-size:13px">請品評者掃碼填寫後再查看</span></div>
    <button class="btn btn-s btn-sm" onclick="showQR('${sid}')" style="width:auto;margin-top:12px">查看 QR Code</button>`;

  const allKeys=[...FIXED,...(sess.enabledTastes||[])];
  const avgs={};
  allKeys.forEach(k=>{
    const vals=resp.map(r=>r.scores[k]).filter(v=>v&&v!=='N/A'&&v>0);
    avgs[k]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  });
  const overall=resp.reduce((a,r)=>a+(r.overallLike||0),0)/n;
  const buyPos=resp.filter(r=>['一定會買','可能會買'].includes(r.buyIntent)).length;
  const anomalyN=sess.showAnomaly?resp.filter(r=>r.anomaly===true).length:null;

  return backBtn+`
    <div class="metrics">
      <div class="metric"><div class="metric-val">${n}</div><div class="metric-lbl">品評人數</div></div>
      <div class="metric"><div class="metric-val">${overall.toFixed(1)}</div><div class="metric-lbl">整體喜好</div></div>
      <div class="metric"><div class="metric-val">${Math.round(buyPos/n*100)}%</div><div class="metric-lbl">購買正向率</div></div>
    </div>
    ${anomalyN!==null?(anomalyN>0?`<div class="tag tag-bad" style="display:block;margin-bottom:12px">⚠ ${anomalyN} 人反映有異味</div>`:`<div class="tag tag-ok" style="display:block;margin-bottom:12px">✓ 無異味反映</div>`):''}
    <div class="slabel">各項評分</div>
    <div class="card">
      ${allKeys.map(k=>{
        const avg=avgs[k]; if(avg===null) return'';
        const pct=Math.round((avg/5)*100);
        const color=avg>=4?'#3A8A50':avg>=3?'#C07010':'#C0392B';
        return `<div class="bar-item"><div class="bar-lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-score">${avg.toFixed(1)}</div></div>`;
      }).join('')}
    </div>
    <div class="slabel">回應明細（${n} 筆）</div>
    ${resp.slice().reverse().map(r=>{
      const ne=Object.entries(r.notes||{}).filter(([,v])=>v);
      return `<div class="rcard">
        <div class="r-head"><div class="r-name">${r.name}${r.dept?' · '+r.dept:''}</div><div class="r-time">${r.time}</div></div>
        <div style="font-size:13px;color:var(--muted)">整體喜好 ${r.overallLike}★ ／ ${r.buyIntent||'未填'}${anomalyN!==null?(r.anomaly===true?' ／ <span class="tag tag-bad">有異味</span>':' ／ <span class="tag tag-ok">無異味</span>'):''}
        </div>
        ${ne.length||r.finalNote?`<div class="r-notes">
          ${ne.map(([k,v])=>`<div><strong>${k}：</strong>${v}</div>`).join('')}
          ${r.finalNote?`<div><strong>整體意見：</strong>${r.finalNote}</div>`:''}
        </div>`:''}
      </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-s btn-sm" onclick="exportCSV('${sid}')" style="width:auto">↓ 匯出 CSV</button>
      <button class="btn btn-d btn-sm" onclick="clearResponses('${sid}')" style="width:auto">清除數據</button>
    </div>`;
}

async function clearResponses(sid) {
  if(!confirm('確定清除此品評的所有數據？')) return;
  await fbRemove(`responses/${sid}`);
  render();
}

function exportCSV(sid) {
  const sess=S.sessions[sid];
  const resp=S.responses[sid]||[];
  const keys=[...FIXED,...(sess.enabledTastes||[])];
  const h=['姓名','部門','時間','整體喜好','購買意願',
    ...(sess.showAnomaly?['是否有異味']:[]),
    ...keys.map(k=>k+'評分'),...keys.map(k=>k+'意見'),'整體意見'];
  const rows=resp.map(r=>[
    r.name,r.dept,r.time,r.overallLike,r.buyIntent||'',
    ...(sess.showAnomaly?[r.anomaly===true?'有':r.anomaly===false?'無':'']:[]),
    ...keys.map(k=>r.scores[k]||''),...keys.map(k=>(r.notes&&r.notes[k])||''),r.finalNote||''
  ]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`品評_${sess.product}_${new Date().toLocaleDateString('zh-TW')}.csv`;
  a.click();
}

// ── Header ──
function updateHeader() {
  const sid=S.sessionId;
  const cfg=S.sessionSetup;
  if (S.adminOK) {
    document.getElementById('h-title').textContent='品評管理後台';
    document.getElementById('h-sub').textContent='管理員模式';
  } else if (cfg) {
    document.getElementById('h-title').textContent=cfg.product||'品評表單';
    document.getElementById('h-sub').textContent=cfg.evalDate?`品評日期：${cfg.evalDate}`:'歡迎參與品評';
  } else {
    document.getElementById('h-title').textContent='品評表單';
    document.getElementById('h-sub').textContent='載入中...';
  }
}

// ── Main render ──
function render() {
  const nav=document.getElementById('nav');
  if (S.adminOK) {
    nav.style.display='';
    const adminTabs=[
      {id:'sessions',label:'📋 品評列表'},
      {id:'edit',label:'✎ 編輯',hide:!S.editSession},
      {id:'qr',label:'▣ QR碼',hide:!_qrSessionId},
      {id:'dashboard',label:'◉ 後台',hide:!S.currentSession}
    ].filter(t=>!t.hide);
    nav.innerHTML=adminTabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';render();scrollTo(0,0)">${t.label}</button>`).join('')
      +`<button class="nav-btn danger" onclick="exitAdmin()" style="margin-left:auto">✕ 離開</button>`;
  } else {
    nav.style.display='none';
  }

  updateHeader();
  const c=document.getElementById('content');
  let html='';
  if(S.adminPrompt) html+=renderAdminPrompt();
  if(S.adminOK){
    if(S.tab==='sessions') html+=renderSessions();
    else if(S.tab==='edit') html+=renderEdit();
    else if(S.tab==='qr') html+=renderQR();
    else if(S.tab==='dashboard') html+=renderDashboard();
  } else {
    html+=renderForm();
  }
  c.innerHTML=html;
}

// ── Init ──
document.addEventListener('firebase-ready', () => {
  fb=true;
  const sid=getSessionId();
  if (sid) {
    S.sessionId=sid;
    listenSessionSetup(sid);
  } else {
    // 沒有 session id：顯示提示
    S.sessionSetup=null;
  }
  listenSessions();
  listenAllResponses();
  render();
});

loadAdminPin();
render();
setTimeout(()=>{ if(!fb) render(); },1500);
</script>
</body>
</html>
